          <h1 class="project__title" id="project-title">オリジナルLINEスタンプ</h1>

        <figure class="project__mockup">

      <section class="brief" aria-label="制作概要">

          <div class="brief__item">
            <dt><img class="brief__sparkle" src="../img/star.png" alt="" aria-hidden="true">概要</dt>
            <dd>
              単体でも使いやすいことを意識して制作した、オリジナルのLINEスタンプです。<br>
              日常会話の中で気軽に送れるよう、シンプルでわかりやすい表現を意識しました。
            </dd>
          </div>

          <div class="brief__item">
            <dt><img class="brief__sparkle" src="../img/star.png" alt="" aria-hidden="true">制作数</dt>
            <dd>
              全40個
            </dd>
          </div>

          <div class="brief__item">
            <dt><img class="brief__sparkle" src="../img/star.png" alt="" aria-hidden="true">制作期間</dt>
            <dd>
              約2週間
            </dd>
          </div>

          <div class="brief__item">
            <dt><img class="brief__sparkle" src="../img/star.png" alt="" aria-hidden="true">使用したツール</dt>
